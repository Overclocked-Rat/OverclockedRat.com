<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overclocked Rat - Blog</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Montserrat&display=swap" rel="stylesheet">
  <style>
    /* Starfield canvas styles */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none; /* allow clicks through */
    }

    /* Container for content */
    #content {
      position: relative;
      z-index: 1; /* ensures content sits above canvas */
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #F0EDEE;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.6;
    }

    h1, h2 {
      font-family: 'Merriweather', serif;
      text-align: center;
      color: #F0EDEE;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 0.5rem 0;
    }

    a {
      text-decoration: none;
      color: #66FCF1;
    }

    a:hover {
      color: #45A29E;
      text-decoration: underline;
    }

    .date {
      color: #C5C6C7;
      font-size: 0.9em;
      margin-left: 0.5rem;
    }

    body {
      background-color: #0B0C10; /* fallback for canvas */
      margin: 0; /* remove default margin */
    }
  </style>
</head>
<body>
  <!-- Starfield canvas -->
  <canvas id="starfield"></canvas>

  <!-- Content container -->
  <div id="content">
    <h1>OVERCLOCKED RAT</h1>
    <div class="center">
    <img src="/images/rat.png" alt="Rat.... GLorious Rat!" style="width: 20%;">
    </div>
    <h2>Blog Posts</h2>
    <ul id="blog-list"></ul>
  </div>

  <script>
    // --- Starfield JS ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const numStars = 150;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for (let i = 0; i < numStars; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5 + 0.5,
        alpha: Math.random(),
        delta: Math.random() * 0.02
      });
    }

    function animateStars() {
      ctx.fillStyle = '#0B0C10';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let star of stars) {
        star.alpha += star.delta;
        if (star.alpha <= 0 || star.alpha >= 1) star.delta *= -1;

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(animateStars);
    }
    animateStars();

    // --- Blog list loader ---
    fetch("posts.json?" + new Date().getTime())
      .then(response => response.json())
      .then(posts => {
        posts.sort((a, b) => {
          const dateA = a.date ? new Date(a.date) : new Date(0);
          const dateB = b.date ? new Date(b.date) : new Date(0);
          return dateB - dateA;
        });

        const list = document.getElementById("blog-list");
        list.innerHTML = "";

        posts.forEach(post => {
          const li = document.createElement("li");

          const a = document.createElement("a");
          a.href = post.file;
          a.textContent = post.title;
          li.appendChild(a);

          if (post.date) {
            const dateObj = new Date(post.date);
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = ` (${day}/${month}/${year})`;
            li.appendChild(date);
          }

          list.appendChild(li);
        });
      })
      .catch(error => {
        console.error("Failed to load blog posts:", error);
        document.getElementById("blog-list").innerHTML = "<li>Unable to load blog posts.</li>";
      });
  </script>
</body>
</html>
